name: Deploy SentiTrack
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: ./python-inference
          push: true
          tags: kimheeseon/sentitrack-inference:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: kimheeseon/sentitrack-gateway:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: kimheeseon/sentitrack-frontend:latest

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m  #  1번 조치: AI 모델 로딩 및 헬스체크 대기를 위해 타임아웃을 10분으로 연장!
          script: |
            if [ ! -d ~/sentitrack/.git ]; then
              rm -rf ~/sentitrack
              git clone https://github.com/kimheeseon0526/SentiTrack.git ~/sentitrack
            fi
            cd ~/sentitrack
            git pull origin main

            # 💡 2번 조치: GitHub Secrets를 사용해 OCI 서버에 실시간으로 .env 파일 생성하기
            echo "DB_USER=${{ secrets.DB_USER }}" > .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env

            docker network inspect shared-net >/dev/null 2>&1 || docker network create shared-net
            docker compose -f docker-compose.prod.yml pull
            
            # .env가 적용된 상태로 컨테이너 실행
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f