name: Deploy SentiTrack

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate required deployment secrets
        run: |
          set -e

          missing=""
          [ -n "$DB_USER" ] || missing="$missing DB_USER"
          [ -n "$DB_PASSWORD" ] || missing="$missing DB_PASSWORD"
          [ -n "$JWT_SECRET" ] || missing="$missing JWT_SECRET"
          [ -n "$RESEND_API_KEY" ] || missing="$missing RESEND_API_KEY"

          if [ -n "$missing" ]; then
            echo "Missing required GitHub Secrets:$missing"
            exit 1
          fi
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: ./python-inference
          push: true
          tags: kimheeseon/sentitrack-inference:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: kimheeseon/sentitrack-gateway:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: kimheeseon/sentitrack-frontend:latest

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            if [ ! -d ~/sentitrack/.git ]; then
              rm -rf ~/sentitrack
              git clone https://github.com/kimheeseon0526/SentiTrack.git ~/sentitrack
            fi

            cd ~/sentitrack
            git pull origin main

            cat > .env <<EOF
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EOF

            chmod 600 .env

            docker network inspect shared-net >/dev/null 2>&1 || docker network create shared-net

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

            echo "Applying database migrations..."
            for f in $(ls gateway/migrations/*.sql | sort); do
              echo "  -> $f"
              docker exec -i sentitrack-db mysql -u "${{ secrets.DB_USER }}" -p"${{ secrets.DB_PASSWORD }}" sentitrack < "$f"
            done
