name: Deploy SentiTrack

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: ./python-inference
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentitrack-inference:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentitrack-gateway:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentitrack-frontend:latest

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            cd ~

            if [ ! -d sentitrack/.git ]; then
              echo "=== 저장소가 없어서 새로 clone 합니다 ==="
              rm -rf sentitrack
              git clone https://github.com/kimheeseon0526/SentiTrack.git sentitrack
            fi

            cd ~/sentitrack

            echo "=== 최신 코드 pull ==="
            git pull origin main

            echo "=== .env 생성 ==="
            cat > .env <<EOF
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EOF

            chmod 600 .env

            echo "=== .env 생성 확인 ==="
            cat .env | sed 's/=.*/=****/'

            echo "=== 현재 배포 경로 확인 ==="
            pwd
            ls -la

            echo "=== shared-net 네트워크 확인 ==="
            docker network inspect shared-net >/dev/null 2>&1 || docker network create shared-net

            echo "=== Docker 이미지 pull ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== 기존 컨테이너 정리 ==="
            docker compose -f docker-compose.prod.yml down || true

            echo "=== 컨테이너 실행 ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== 컨테이너 상태 ==="
            docker compose -f docker-compose.prod.yml ps

            echo "=== DB 로그 ==="
            docker logs sentitrack-db --tail 80 || true

            echo "=== Inference 로그 ==="
            docker logs sentitrack-inference --tail 80 || true

            echo "=== Gateway 로그 ==="
            docker logs sentitrack-gateway --tail 80 || true

            echo "=== 미사용 이미지 정리 ==="
            docker image prune -f