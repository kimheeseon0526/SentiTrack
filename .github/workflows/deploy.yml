name: Deploy SentiTrack

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: ./python-inference
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentitrack-inference:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentitrack-gateway:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentitrack-frontend:latest

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~

            if [ ! -d sentitrack/.git ]; then
              rm -rf sentitrack
              git clone https://github.com/kimheeseon0526/SentiTrack.git sentitrack
            fi

            cd ~/sentitrack
            git pull origin main

            # 1. 안전하게 .env 파일 한 줄씩 생성 (특수문자 방어)
            echo "DB_USER=${{ secrets.DB_USER }}" > .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
            chmod 600 .env

            # 2. 외부 도커 네트워크 생성 및 확인
            docker network inspect shared-net >/dev/null 2>&1 || docker network create shared-net

            # 3. 도커 컴포즈 실행 (반드시 프로덕션 파일 지정 옵션 유지)
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # 4. 배포 상태 모니터링 로그 출력
            echo "=== 컨테이너 배포 상태 ==="
            docker compose -f docker-compose.prod.yml ps
            
            # 5. 미사용 이미지 클리닝
            docker image prune -f